<!DOCTYPE html>

<html lang="ru">
<head>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-D8Q02QN6XJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-D8Q02QN6XJ');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qatan Yehudit</title>
    
    <!-- Подключаем ядро виртуальной клавиатуры Keyman -->
    <script src="https://s.keyman.com/kmw/engine/17.0.330/keymanweb.js"></script>
    <!-- Подключаем интерфейс (кнопка переключения языков/вызова клавиатуры) -->
    <script src="https://s.keyman.com/kmw/engine/17.0.330/kmwuitoggle.js"></script>

    <!-- Подключаем библиотеки для быстрого (тихого) сохранения в PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* ПОДКЛЮЧАЕМ ШРИФТ */
        @font-face {
            font-family: 'Ezra SIL';
            src: url('fonts/SILEOT.ttf') format('truetype');
                 /* url('fonts/MyFont.woff2') format('woff2')*/
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: Ezra SIL, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Общий стиль для кнопок */
        button {
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }

        button:disabled {
            background-color: #6c757d !important;
            cursor: not-allowed;
        }

        /* Синяя кнопка для системной печати */
        .print-btn {
            background-color: #007bff;
        }
        .print-btn:hover { background-color: #0056b3; }

        /* Зеленая кнопка для быстрого скачивания */
        .save-btn {
            background-color: #28a745;
        }
        .save-btn:hover { background-color: #218838; }

        /* ПОЛЕ ДЛЯ ВВОДА ТЕКСТА */
        textarea {
            width: 100%;
            max-width: 210mm; /* Ограничиваем шириной листа А4 */
            height: 60vh; /* Занимает 60% высоты экрана */
            padding: 20px;
            box-sizing: border-box;
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border: 1px solid #ccc;
            border-radius: 5px;
            
            /* Применяем шрифт и УВЕЛИЧИВАЕМ РАЗМЕР для огласовок */
            font-family: 'Ezra SIL', sans-serif;
            font-size: 42px; /* Очень крупный размер для комфорта */
            line-height: 1.6;
            
            /* Настройки для иврита */
            direction: rtl; /* Направление текста справа налево */
            text-align: right;
            resize: vertical;
        }

        /* 
           УНИВЕРСАЛЬНЫЙ СКРЫТЫЙ КОНТЕЙНЕР 
           По умолчанию спрятан за левым краем экрана.
           Нужен для html-to-image.
        */
        #render-container {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 210mm; /* Ширина А4 */
            min-height: 297mm;
            padding: 20mm;
            box-sizing: border-box;
            background-color: #ffffff;
            
            font-family: 'Ezra SIL', sans-serif;
            font-size: 38px;
            line-height: 1.6;
            direction: rtl;
            text-align: right;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* НАСТРОЙКИ ДЛЯ СИСТЕМНОЙ ПЕЧАТИ (window.print) */
        @media print {
            /* Прячем кнопки, редактор и клавиатуру Keyman */
            body > *:not(#render-container) {
                display: none !important;
            }
            
            body { background: white; padding: 0; }

            /* Возвращаем скрытый контейнер на экран для печати */
            #render-container {
                position: static !important;
                left: 0 !important;
                width: auto !important;
                min-height: auto !important;
                padding: 0 !important; /* Отступы задаст принтер */
            }

            @page { margin: 20mm; }
        }

    </style>
</head>
<body>

    <div class="controls">
        <button class="print-btn" onclick="printNative()">🖨️ Печать / Выделяемый PDF</button>
        <button class="save-btn" onclick="saveSilentPDF()">⬇️ Быстрый PDF (в 1 клик)</button>
        <!-- Кнопка клавиатуры Keyman появится здесь автоматически -->
    </div>

    <!-- Поле ввода, к которому автоматически привяжется Keyman -->
    <textarea id="editor" placeholder="Начните печатать здесь"></textarea>

    <!-- Универсальный контейнер для экспорта/печати -->
    <div id="render-container"></div>

    <script>
        // 1. Инициализация виртуальной клавиатуры Keyman
        window.addEventListener('load', function () {
            if (typeof keyman !== 'undefined') {
                keyman.init({ attachType: 'auto' });
                keyman.addKeyboards('sil_hebrew');
            }
        });

        // Вспомогательная функция: копируем текст перед любым экспортом
        function prepareText() {
            const editor = document.getElementById('editor');
            const renderContainer = document.getElementById('render-container');
            
            if (!editor.value.trim()) {
                alert("Пожалуйста, введите текст.");
                return false;
            }
            
            renderContainer.innerText = editor.value;
            return true;
        }

        // ==========================================
        // КНОПКА 1: СИСТЕМНАЯ ПЕЧАТЬ (window.print)
        // ==========================================
        function printNative() {
            if (!prepareText()) return;
            // Браузер сам применит стили @media print и покажет окно
            window.print();
        }

        // ==========================================
        // КНОПКА 2: БЫСТРОЕ СОХРАНЕНИЕ (html-to-image)
        // ==========================================
        async function saveSilentPDF() {
            if (!prepareText()) return;

            const renderContainer = document.getElementById('render-container');
            const btn = document.querySelector('.save-btn');

            // Индикация процесса
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ Формируем...";
            btn.disabled = true;

            try {
                // Делаем снимок скрытого блока
                const dataUrl = await htmlToImage.toPng(renderContainer, {
                    pixelRatio: 2,
                    backgroundColor: '#ffffff'
                });

                // Создаем PDF
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = 210;
                const pageHeight = 297;

                // Считаем пропорции картинки
                const imgProps = pdf.getImageProperties(dataUrl);
                const imgHeight = (imgProps.height * pdfWidth) / imgProps.width;

                let heightLeft = imgHeight;
                let position = 0;

                // Первая страница
                pdf.addImage(dataUrl, 'PNG', 0, position, pdfWidth, imgHeight);
                heightLeft -= pageHeight;

                // Дополнительные страницы (если текст длинный)
                while (heightLeft > 0) {
                    position = heightLeft - imgHeight;
                    pdf.addPage();
                    pdf.addImage(dataUrl, 'PNG', 0, position, pdfWidth, imgHeight);
                    heightLeft -= pageHeight;
                }

                // Скачиваем без лишних вопросов
                pdf.save('hebrew-document.pdf');

            } catch (error) {
                console.error('Ошибка:', error);
                alert('Произошла ошибка при создании PDF.');
            } finally {
                // Возвращаем кнопку в норму
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
