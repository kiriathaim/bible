<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qatan Yehudit</title>
    
    <!-- Подключаем ядро виртуальной клавиатуры Keyman -->
    <script src="https://s.keyman.com/kmw/engine/17.0.330/keymanweb.js"></script>
    <!-- Подключаем интерфейс (кнопка переключения языков/вызова клавиатуры) -->
    <script src="https://s.keyman.com/kmw/engine/17.0.330/kmwuitoggle.js"></script>
    
    <style>
        /* ПОДКЛЮЧАЕМ ШРИФТ */
        @font-face {
            font-family: 'Ezra SIL';
            src: url('fonts/SILEOT.ttf') format('truetype');
                 /* url('fonts/MyFont.woff2') format('woff2')*/
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: Ezra SIL, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        button.save-btn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button.save-btn:hover {
            background-color: #218838;
        }

        /* ПОЛЕ ДЛЯ ВВОДА ТЕКСТА */
        textarea {
            width: 100%;
            max-width: 210mm; /* Ограничиваем шириной листа А4 */
            height: 60vh; /* Занимает 60% высоты экрана */
            padding: 20px;
            box-sizing: border-box;
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border: 1px solid #ccc;
            border-radius: 5px;
            
            /* Применяем шрифт и УВЕЛИЧИВАЕМ РАЗМЕР для огласовок */
            font-family: 'Ezra SIL', sans-serif;
            font-size: 42px; /* Очень крупный размер для комфорта */
            line-height: 1.6;
            
            /* Настройки для иврита */
            direction: rtl; /* Направление текста справа налево */
            text-align: right;
            resize: vertical;
        }

        /* Скрытый блок. Нужен только для идеального экспорта в PDF */
        #print-container {
            display: none;
            width: 100%;
            font-family: 'Ezra SIL', sans-serif;
            font-size: 42px;
            line-height: 1.6;
            direction: rtl;
            text-align: right;
            white-space: pre-wrap; /* Учитывает переносы строк (Enter) */
            word-wrap: break-word;
        }

        /* Сохранение в PDF) */
        @media print {
            /* Прячем всё лишнее (кнопки, поле ввода, клавиатуру Keyman) */
            body > *:not(#print-container) {
                display: none !important;
            }
            
            body {
                background: white;
                padding: 0;
            }

            /* Показываем только чистый подготовленный текст */
            #print-container {
                display: block !important;
            }

            /* Задаем стандартные поля для PDF-страницы */
            @page {
                margin: 20mm;
            }
        }

    </style>
</head>
<body>

    <div class="controls">
        <button class="save-btn" onclick="saveToPDF()">Сохранить в PDF</button>
        <!-- Кнопка клавиатуры Keyman появится здесь автоматически -->
    </div>

    <!-- Поле ввода, к которому автоматически привяжется Keyman -->
    <textarea id="editor" placeholder="הקלד כאן... (Начните печатать здесь)"></textarea>

    <!-- Невидимый контейнер для печати (браузер отрендерит его в PDF) -->
    <div id="print-container"></div>

    <script>
    // Инициализация KeymanWeb после полной загрузки страницы
    window.addEventListener('load', function () {
        if (typeof keyman !== 'undefined') {
            // Запускаем движок (он сам найдет textarea)
            keyman.init({
                attachType: 'auto'
            });
            // Загружаем официальную клавиатуру иврита SIL с огласовками
            keyman.addKeyboards('sil_hebrew');
        } else {
            console.error("KeymanWeb не загрузился. Проверьте подключение к интернету.");
        }
    });

    // Функция подготовки текста и вызова окна сохранения PDF
    function saveToPDF() {
        const editor = document.getElementById('editor');
        const printContainer = document.getElementById('print-container');
        
        // Копируем текст
        printContainer.innerText = editor.value;
        
        // Вызываем окно печати
        window.print();
    }
</script>
</body>
</html>
