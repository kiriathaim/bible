<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Еврейский алфавит</title>
    <link rel="stylesheet" href="ancient_hebrew_alphabet_table.css">
</head>
<body>

    <h1>Таблица еврейского алфавита</h1>

    <table>
        <thead>
            <tr>
                <th rowspan="2">БУКВА</th>
                <th rowspan="2">СОФИТ</th>
                <th rowspan="2">НАЗВАНИЕ</th>
                <th rowspan="2">ЗВУК</th>
                <th colspan="2">ТРАНСЛИТЕРАЦИЯ</th>
                <th rowspan="2">IPA</th>
                <th rowspan="2">ПРОИЗНОШЕНИЕ</th>
            </tr>
            <tr>
                <th>РУССК.</th>
                <th>АНГЛ.</th>
            </tr>
        </thead>
        <tbody>
            <!-- Пример строки: Алеф -->
            <tr>
                <td class="hebrew">א</td>
                <td></td>
                <td>АЛЭФ</td>
                <td>Гортанный взрывной</td>
                <td>'</td>
                <td>'</td>
                <td>ʔ</td>
                <td>
                    <button onclick="playAudio('aleph.mp3')">▶</button>
                </td>
            </tr>
            <!-- Пример строки: Бэт -->
            <tr>
                <td class="hebrew">בּ</td>
                <td></td>
                <td>БЭТ</td>
                <td>Звонкий губно-губной смычный</td>
                <td>Б</td>
                <td>b</td>
                <td>b</td>
                <td>
                    <button onclick="playAudio('bet.mp3')">▶</button>
                </td>
            </tr>
            <!-- Пример строки: Вэт -->
            <tr>
                <td class="hebrew">ב</td>
                <td></td>
                <td>ВЭТ</td>
                <td>Звонкий губно-зубной щелевой</td>
                <td>В</td>
                <td><u>b</u></td>
                <td>v</td>
                <td>
                    <button onclick="playAudio('vet.mp3')">▶</button>
                </td>
            </tr>
            <!-- Здесь нужно добавить остальные буквы по аналогии -->
            <!-- Для краткости я добавил только примеры, ниже объясню как дополнить -->
        </tbody>
    </table>

    <!-- Скрытый аудио-плеер -->
    <audio id="player"></audio>

    <script>
        function playAudio(filename) {
            const player = document.getElementById('player');
            player.src = 'audio/' + filename;
            player.play();
        }
    </script>
</body>
</html>
