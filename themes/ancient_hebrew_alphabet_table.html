<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Еврейский алфавит</title>
    <link rel="stylesheet" href="ancient_hebrew_alphabet_table.css">
</head>
<body>
<div class="container">
    <h1>Таблица еврейского алфавита</h1>
    <div class="table-responsive">
    <table>
        <thead>
            <tr>
                <th rowspan="2">БУКВА</th>
                <th rowspan="2">СОФИТ</th>
                <th rowspan="2">НАЗВАНИЕ</th>
                <th rowspan="2">ЗВУК</th>
                <th colspan="2">ТРАНСЛИТЕРАЦИЯ</th>
                <th rowspan="2">IPA</th>
                <th rowspan="2">ПРОИЗНОШЕНИЕ</th>
            </tr>
            <tr>
                <th>РУССК.</th>
                <th>АНГЛ.</th>
            </tr>
        </thead>
        <tbody>
            <!-- Пример строки: Алеф -->
            <tr>
                <td class="hebrew">א</td>
                <td class="hebrew"></td>
                <td class="name">АЛЭФ</td>
                <td class="sound-desc desktop-only">Гортанный взрывной</td>
                <td class="translit">'</td>
                <td class="translit">'</td>
                <td class="ipa">ʔ</td>
                <td><button class="play-btn" onclick="toggleAudio('aleph.mp3', this)">▶</button></td>
            </tr>
            <!-- Пример строки: Бэт -->
            <tr>
                <td class="hebrew">בּ</td>
                <td class="hebrew"></td>
                <td class="name">БЭТ</td>
                <td class="sound-desc desktop-only">Звонкий губно-губной смычный</td>
                <td class="translit highlight-ru">Б</td>
                <td class="translit">b</td>
                <td class="ipa">b</td>
                <td><button class="play-btn" onclick="toggleAudio('bet.mp3')">▶</button></td>
            </tr>
            <!-- Пример строки: Вэт -->
            <tr>
                <td class="hebrew">ב</td>
                <td class="hebrew"></td>
                <td class="name">ВЭТ</td>
                <td class="sound-desc desktop-only">Звонкий губно-зубной щелевой</td>
                <td class="translit highlight-ru">В</td>
                <td class="translit"><u>b</u></td>
                <td class="ipa">v</td>
                <td><button class="play-btn" onclick="toggleAudio('vet.mp3')">▶</button></td>
            </tr>
            <!-- Здесь нужно добавить остальные буквы по аналогии -->
            <!-- Для краткости я добавил только примеры, ниже объясню как дополнить -->
        </tbody>
    </table>
</div>
        <p class="mobile-hint">← Листайте таблицу вправо, если она не помещается →</p>
</div>

    <!-- Скрытый аудио-плеер -->
    <audio id="player"></audio>

    <script>
        let currentAudio = new Audio();
        let currentButton = null;

        function toggleAudio(filename, btn) {
            const audioPath = 'audio/' + filename;

            // Если нажали на ту же кнопку, что уже играет
            if (currentButton === btn) {
                if (currentAudio.paused) {
                    currentAudio.play();
                    btn.innerHTML = '⏸';
                    btn.classList.add('playing');
                } else {
                    currentAudio.pause();
                    btn.innerHTML = '▶';
                    btn.classList.remove('playing');
                }
                return;
            }

            // Если нажали на новую кнопку, а старая еще играет
            if (currentButton) {
                currentButton.innerHTML = '▶';
                currentButton.classList.remove('playing');
            }

            // Настраиваем новый трек
            currentAudio.src = audioPath;
            currentAudio.play();
            currentButton = btn;
            btn.innerHTML = '⏸';
            btn.classList.add('playing');

            // Когда звук закончился — возвращаем иконку Play
            currentAudio.onended = function() {
                btn.innerHTML = '▶';
                btn.classList.remove('playing');
                currentButton = null;
            };
       }
    </script>
</body>
</html>
